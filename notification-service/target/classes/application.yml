# =========================================================================
# application.yml — notification-service
# =========================================================================

spring:
  application:
    name: notification-service

  datasource:
    # Banco próprio: "notificationdb" — isolado dos outros serviços
    url: jdbc:h2:mem:notificationdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console  # http://localhost:8084/h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # acknowledge-mode: auto → confirma a mensagem automaticamente quando
        # o método consumidor retornar sem lançar exceção.
        # Se lançar exceção, a mensagem pode ser re-enfileirada (dependendo da config).
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000  # Aguarda 1s entre tentativas

server:
  port: 8084

logging:
  level:
    com.markovitz: DEBUG
    org.hibernate.SQL: DEBUG
